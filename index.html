<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>find your way</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital@0;1&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}

#space{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,#0a0520 0%,#020010 50%,#000 100%);}

canvas#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
canvas#game-canvas{position:fixed;inset:0;z-index:2;cursor:crosshair;}

/* Planets */
.planet{position:fixed;border-radius:50%;pointer-events:none;z-index:1;}
#p1{width:140px;height:140px;top:-30px;right:8%;
  background:radial-gradient(circle at 35% 32%,#c8a0ff,#6020c0 40%,#1a0050 80%,#0a0020);
  box-shadow:0 0 40px #6020c088,inset -20px -15px 40px rgba(0,0,0,0.6);
  animation:spin1 40s linear infinite;}
#p2{width:80px;height:80px;bottom:12%;left:4%;
  background:radial-gradient(circle at 38% 30%,#ffddaa,#e07020 45%,#802000 80%,#300800);
  box-shadow:0 0 25px #e0702055,inset -12px -10px 25px rgba(0,0,0,0.5);
  animation:spin2 28s linear infinite;}
#p3{width:55px;height:55px;top:20%;left:2%;
  background:radial-gradient(circle at 40% 35%,#aaddff,#2060c0 45%,#0a1a50 80%,#010510);
  box-shadow:0 0 18px #2060c055,inset -8px -7px 18px rgba(0,0,0,0.5);
  animation:spin1 55s linear infinite reverse;}

/* Saturn ring */
#p1::after{
  content:'';position:absolute;
  width:200px;height:50px;
  top:50%;left:50%;transform:translate(-50%,-50%) rotateX(75deg);
  border-radius:50%;
  border:14px solid rgba(180,140,255,0.35);
  box-shadow:0 0 12px rgba(180,140,255,0.2);
}

@keyframes spin1{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
@keyframes spin2{from{filter:brightness(1)}to{filter:brightness(1.15)}}

/* UI */
#hint{
  position:fixed;top:28px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:0.7rem;font-weight:400;
  color:rgba(180,160,255,0.6);letter-spacing:0.35em;text-transform:uppercase;
  z-index:10;text-align:center;pointer-events:none;
  text-shadow:0 0 20px rgba(180,160,255,0.3);
  animation:pulse-txt 3s ease-in-out infinite;
}
@keyframes pulse-txt{0%,100%{opacity:0.5}50%{opacity:0.9}}

#progress{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:'Space Mono',monospace;font-size:0.65rem;
  color:rgba(120,100,200,0.5);letter-spacing:0.2em;
  z-index:10;pointer-events:none;
}

#reset-btn{
  position:fixed;top:28px;right:32px;
  font-family:'Space Mono',monospace;font-size:0.6rem;
  color:rgba(120,100,180,0.4);letter-spacing:0.15em;
  background:none;border:1px solid rgba(120,100,180,0.2);
  padding:6px 14px;cursor:pointer;z-index:10;
  transition:all 0.2s;
}
#reset-btn:hover{color:rgba(180,160,255,0.8);border-color:rgba(180,160,255,0.4);}

/* End scroll screen */
#end-screen{
  position:fixed;inset:0;z-index:100;
  background:#000;
  display:none;flex-direction:column;align-items:center;
  overflow:hidden;
}
#end-screen.show{display:flex;}

#end-scroll{
  width:100%;max-width:680px;
  padding:80px 40px 2000px;
  overflow-y:scroll;height:100%;
  scrollbar-width:none;-ms-overflow-style:none;
}
#end-scroll::-webkit-scrollbar{display:none;}

.end-text{
  font-family:'Space Mono',monospace;font-size:0.88rem;
  color:rgba(200,190,255,0.85);line-height:1.95;
  white-space:pre-wrap;
}

.trophy{
  font-family:'Orbitron',monospace;font-size:0.75rem;font-weight:700;
  letter-spacing:0.2em;margin:8px 0;
  opacity:0;animation:trophy-appear 0.8s ease forwards;
}
.trophy.plastic{color:#aaaaaa;text-shadow:0 0 10px #aaa8;}
.trophy.bronze{color:#cd7f32;text-shadow:0 0 10px #cd7f3288;}
.trophy.silver{color:#c0c0c0;text-shadow:0 0 12px #c0c0c088;}
.trophy.gold{color:#ffd700;text-shadow:0 0 15px #ffd70099;}
.trophy.platinum{color:#e5e4e2;text-shadow:0 0 18px rgba(229,228,226,0.6);}
.trophy.true{
  color:#ff88ff;
  text-shadow:0 0 20px #ff88ff,0 0 40px #cc44cc;
  font-size:0.8rem;
}
@keyframes trophy-appear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Search bar */
#search-wrap{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:50;display:none;flex-direction:column;align-items:center;gap:10px;
}
#search-wrap.open{display:flex;}
#search-bar{
  background:rgba(10,5,25,0.92);
  border:1px solid rgba(180,160,255,0.3);
  color:rgba(200,180,255,0.9);
  font-family:'Space Mono',monospace;font-size:0.9rem;
  padding:12px 22px;width:280px;text-align:center;
  outline:none;letter-spacing:0.2em;
  box-shadow:0 0 30px rgba(120,80,255,0.2);
}
#search-bar::placeholder{color:rgba(140,120,200,0.35);}
#search-label{
  font-family:'Space Mono',monospace;font-size:0.6rem;
  color:rgba(140,120,200,0.4);letter-spacing:0.2em;
}
</style>
</head>
<body>
<div id="space"></div>
<canvas id="stars-canvas"></canvas>

<div class="planet" id="p1"></div>
<div class="planet" id="p2"></div>
<div class="planet" id="p3"></div>

<div id="hint">chart a path from origin to destination · connect the stars in order</div>
<div id="progress">connections: <span id="conn-count">0</span> / <span id="conn-total"></span></div>
<button id="reset-btn" onclick="resetLines()">↺ reset</button>

<div id="search-wrap">
  <div id="search-label">search · · ·</div>
  <input id="search-bar" placeholder="type here..." autocomplete="off" spellcheck="false">
</div>

<canvas id="game-canvas"></canvas>

<!-- End screen -->
<div id="end-screen">
  <div id="end-scroll"></div>
</div>

<script>
// ── STARS BACKGROUND ──────────────────────────────────────────────────────
const sc = document.getElementById('stars-canvas');
const sctx = sc.getContext('2d');
sc.width = window.innerWidth; sc.height = window.innerHeight;

const stars = [];
for(let i=0;i<320;i++){
  stars.push({
    x:Math.random()*sc.width, y:Math.random()*sc.height,
    r:Math.random()*1.4+0.2,
    a:Math.random(), da:(Math.random()-0.5)*0.008,
    color:`hsl(${220+Math.random()*80},${40+Math.random()*40}%,${70+Math.random()*30}%)`
  });
}

// Asteroids
const asteroids=[];
for(let i=0;i<12;i++){
  const side=Math.floor(Math.random()*4);
  let x,y,vx,vy;
  const sp=0.18+Math.random()*0.35;
  if(side===0){x=Math.random()*sc.width;y=-30;vx=(Math.random()-0.5)*0.4;vy=sp;}
  else if(side===1){x=sc.width+30;y=Math.random()*sc.height;vx=-sp;vy=(Math.random()-0.5)*0.4;}
  else if(side===2){x=Math.random()*sc.width;y=sc.height+30;vx=(Math.random()-0.5)*0.4;vy=-sp;}
  else{x=-30;y=Math.random()*sc.height;vx=sp;vy=(Math.random()-0.5)*0.4;}
  asteroids.push({x,y,vx,vy,r:3+Math.random()*8,rot:Math.random()*Math.PI*2,drot:(Math.random()-0.5)*0.02,pts:makeAsteroidPts(3+Math.random()*8)});
}
function makeAsteroidPts(r){
  const pts=[];const n=7+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    const rd=r*(0.6+Math.random()*0.5);
    pts.push({x:Math.cos(a)*rd,y:Math.sin(a)*rd});
  }
  return pts;
}

function animStars(){
  sctx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    s.a+=s.da; if(s.a>1||s.a<0) s.da*=-1;
    sctx.globalAlpha=s.a;
    sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sctx.fillStyle=s.color; sctx.fill();
  });
  // asteroids
  sctx.globalAlpha=0.7;
  asteroids.forEach(a=>{
    a.x+=a.vx; a.y+=a.vy; a.rot+=a.drot;
    if(a.x<-50||a.x>sc.width+50||a.y<-50||a.y>sc.height+50){
      const side=Math.floor(Math.random()*4); const sp=0.18+Math.random()*0.35;
      if(side===0){a.x=Math.random()*sc.width;a.y=-30;a.vx=(Math.random()-0.5)*0.4;a.vy=sp;}
      else if(side===1){a.x=sc.width+30;a.y=Math.random()*sc.height;a.vx=-sp;a.vy=(Math.random()-0.5)*0.4;}
      else if(side===2){a.x=Math.random()*sc.width;a.y=sc.height+30;a.vx=(Math.random()-0.5)*0.4;a.vy=-sp;}
      else{a.x=-30;a.y=Math.random()*sc.height;a.vx=sp;a.vy=(Math.random()-0.5)*0.4;}
    }
    sctx.save(); sctx.translate(a.x,a.y); sctx.rotate(a.rot);
    sctx.beginPath(); sctx.moveTo(a.pts[0].x,a.pts[0].y);
    a.pts.forEach(p=>sctx.lineTo(p.x,p.y)); sctx.closePath();
    sctx.fillStyle='rgba(140,120,100,0.5)'; sctx.strokeStyle='rgba(180,160,130,0.6)'; sctx.lineWidth=1;
    sctx.fill(); sctx.stroke(); sctx.restore();
  });
  sctx.globalAlpha=1;
  requestAnimationFrame(animStars);
}
animStars();

// ── GAME CANVAS ───────────────────────────────────────────────────────────
const gc = document.getElementById('game-canvas');
const ctx = gc.getContext('2d');
gc.width = window.innerWidth; gc.height = window.innerHeight;

const W=gc.width, H=gc.height;
const cx=W/2, cy=H/2;

const scale=Math.min(W,H)*0.42;
const rawNodes=[
  {n:'5', rx:-0.62, ry:-0.38},   // 0
  {n:'7', rx:-0.28, ry:-0.46},   // 1
  {n:'2', rx: 0.08, ry:-0.52},   // 2 ★ TOP
  {n:'6', rx: 0.70, ry:-0.38},   // 3
  {n:'1', rx:-0.46, ry:-0.12},   // 4 ★ LEFT
  {n:'6', rx: 0.08, ry:-0.18},   // 5
  {n:'4', rx: 0.28, ry:-0.08},   // 6
  {n:'3', rx: 0.62, ry:-0.10},   // 7 ★ RIGHT (upper 3)
  {n:'8', rx:-0.60, ry: 0.14},   // 8
  {n:'1', rx:-0.30, ry: 0.10},   // 9
  {n:'5', rx: 0.08, ry: 0.22},   // 10
  {n:'3', rx: 0.38, ry: 0.20},   // 11 ★ MID-LEFT of upper 3
  {n:'9', rx: 0.76, ry: 0.24},   // 12
  {n:'4', rx:-0.46, ry: 0.38},   // 13
  {n:'7', rx: 0.08, ry: 0.46},   // 14
  {n:'4', rx: 0.52, ry: 0.44},   // 15
  {n:'4', rx:-0.26, ry: 0.58},   // 16 ★ BOTTOM-LEFT (start)
  {n:'8', rx: 0.08, ry: 0.66},   // 17
  {n:'9', rx: 0.62, ry: 0.60},   // 18 ★ BOTTOM-RIGHT (end)
];

// Path: 16(4,bot-left) → 10(5,middle) → 4(1,left) → 2(2,top) → 7(3,upper-right) → 11(3,mid-left of it) → 18(9,bot-right)
const correctOrder=[16, 10, 4, 2, 7, 11, 18];

const nodes=rawNodes.map(n=>({
  ...n,
  x: cx + n.rx*scale,
  y: cy + n.ry*scale,
  hit: 28
}));

let lines=[]; // {from, to} indices
let drawing=false, fromNode=-1, mouseX=0, mouseY=0;
let completed=false, showHintPath=false;

function getNearNode(x,y){
  for(let i=0;i<nodes.length;i++){
    const d=Math.hypot(nodes[i].x-x,nodes[i].y-y);
    if(d<nodes[i].hit) return i;
  }
  return -1;
}

function lineExists(a,b){
  return lines.some(l=>(l.from===a&&l.to===b)||(l.from===b&&l.to===a));
}

// Build unique required connections from correctOrder
function getRequiredConnections(){
  const required=[];
  for(let i=0;i<correctOrder.length-1;i++){
    const a=correctOrder[i], b=correctOrder[i+1];
    const exists=required.some(r=>(r[0]===a&&r[1]===b)||(r[0]===b&&r[1]===a));
    if(!exists) required.push([a,b]);
  }
  return required;
}
const requiredConns=getRequiredConnections(); // computed once

function checkComplete(){
  if(lines.length<requiredConns.length) return false;
  return requiredConns.every(([a,b])=>lineExists(a,b));
}

gc.addEventListener('mousedown',e=>{
  if(completed) return;
  const r=gc.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  const ni=getNearNode(x,y);
  if(ni>=0){ drawing=true; fromNode=ni; mouseX=x; mouseY=y; }
});

gc.addEventListener('mousemove',e=>{
  const r=gc.getBoundingClientRect();
  mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;
});

gc.addEventListener('mouseup',e=>{
  if(!drawing||completed) return;
  const r=gc.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  const toNode=getNearNode(x,y);
  if(toNode>=0&&toNode!==fromNode&&!lineExists(fromNode,toNode)){
    lines.push({from:fromNode,to:toNode});
    document.getElementById('conn-count').textContent=lines.length;
    if(checkComplete()){
      completed=true;
      setTimeout(showEnd,1200);
    }
  }
  drawing=false; fromNode=-1;
});

// Touch support
gc.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0], r=gc.getBoundingClientRect();
  const x=t.clientX-r.left, y=t.clientY-r.top;
  const ni=getNearNode(x,y);
  if(ni>=0){ drawing=true; fromNode=ni; mouseX=x; mouseY=y; }
},{passive:false});
gc.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0],r=gc.getBoundingClientRect();
  mouseX=t.clientX-r.left; mouseY=t.clientY-r.top;
},{passive:false});
gc.addEventListener('touchend',e=>{
  if(!drawing||completed) return;
  const toNode=getNearNode(mouseX,mouseY);
  if(toNode>=0&&toNode!==fromNode&&!lineExists(fromNode,toNode)){
    lines.push({from:fromNode,to:toNode});
    document.getElementById('conn-count').textContent=lines.length;
    if(checkComplete()){ completed=true; setTimeout(showEnd,1200); }
  }
  drawing=false; fromNode=-1;
});

function resetLines(){ if(completed) return; lines=[]; document.getElementById('conn-count').textContent=0; }

// ── SEARCH BAR (press P) ──────────────────────────────────────────────────
const searchWrap=document.getElementById('search-wrap');
const searchBar=document.getElementById('search-bar');

document.addEventListener('keydown',e=>{
  if(e.key.toLowerCase()==='p' && !document.activeElement.closest('#search-wrap') && document.activeElement!==searchBar){
    e.preventDefault();
    searchWrap.classList.toggle('open');
    if(searchWrap.classList.contains('open')){ searchBar.value=''; searchBar.focus(); }
  }
  if(e.key==='Escape'){ searchWrap.classList.remove('open'); searchBar.blur(); }
});

searchBar.addEventListener('input',()=>{
  if(searchBar.value.toLowerCase()==='dare'){
    showHintPath=true;
    searchWrap.classList.remove('open');
    searchBar.blur();
  }
});

searchBar.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(searchBar.value.toLowerCase()==='dare'){
      showHintPath=true;
    }
    searchWrap.classList.remove('open');
    searchBar.blur();
  }
});

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);

  // Draw hint path (dare cheat)
  if(showHintPath){
    for(let i=0;i<correctOrder.length-1;i++){
      const a=nodes[correctOrder[i]], b=nodes[correctOrder[i+1]];
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle='rgba(220,80,80,0.85)';
      ctx.lineWidth=2.5;
      ctx.shadowColor='rgba(255,80,80,0.6)'; ctx.shadowBlur=14;
      ctx.stroke(); ctx.shadowBlur=0;
    }
  }

  // Draw existing lines — all same neutral color, no correct/wrong feedback
  lines.forEach(l=>{
    const a=nodes[l.from], b=nodes[l.to];
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle='rgba(160,140,255,0.65)';
    ctx.lineWidth=2;
    ctx.shadowColor='rgba(160,140,255,0.3)'; ctx.shadowBlur=8;
    ctx.stroke(); ctx.shadowBlur=0;
  });

  // Drawing line
  if(drawing&&fromNode>=0){
    const a=nodes[fromNode];
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(mouseX,mouseY);
    ctx.strokeStyle='rgba(180,160,255,0.5)'; ctx.lineWidth=1.5;
    ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
  }

  // Draw nodes
  nodes.forEach((n,i)=>{
    const hover=Math.hypot(n.x-mouseX,n.y-mouseY)<n.hit;
    const isActive=fromNode===i;
    const inCorrect=correctOrder.includes(i);

    // Glow
    ctx.beginPath(); ctx.arc(n.x,n.y,18,0,Math.PI*2);
    ctx.fillStyle= isActive?'rgba(200,150,255,0.25)':hover?'rgba(160,120,255,0.15)':'rgba(80,60,160,0.08)';
    ctx.shadowColor='rgba(160,120,255,0.4)'; ctx.shadowBlur=isActive?20:hover?12:0;
    ctx.fill(); ctx.shadowBlur=0;

    // Number
    ctx.font=`bold ${hover||isActive?28:22}px Orbitron, monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle= isActive?'rgba(220,200,255,1)':hover?'rgba(200,180,255,0.95)':'rgba(160,140,220,0.85)';
    ctx.shadowColor='rgba(180,140,255,0.5)'; ctx.shadowBlur=hover?14:6;
    ctx.fillText(n.n,n.x,n.y);
    ctx.shadowBlur=0;
  });

  // Completion flash
  if(completed){
    ctx.fillStyle='rgba(220,80,80,0.04)';
    ctx.fillRect(0,0,W,H);
  }

  requestAnimationFrame(render);
}
render();

// ── END SCREEN ────────────────────────────────────────────────────────────
function showEnd(){
  const es=document.getElementById('end-screen');
  const scroll=document.getElementById('end-scroll');
  es.classList.add('show');

  const content=`Yo yo yo, its me Swoba! It looks like you completed our hunt, a lot of content sadly had to be cut since the timing of releasing was tight. So it really is over now, how long did it take to complete this i wonder. Did i make some steps too hard or too short, well i know i made some too short, i really hope you enjoyed this hunt, it really burned me to make this, whatever that means. Well i guess see you in the next hunt or something.


Oh yeah! ur prize, uhmmm... well theres no prize but you can have this one role! The first 3 members will get this role only so congratulations unless if you were 4th or later. Well theres one more thing you probably havent done yet...



Oh you want me to tell it uhmmm, what can i say about it, well its in the terminal collect them all to get a super radical prize that only the first person will get who finds all the a... i wont say anything more. Well uhhh go redeem your prize. With love from: Void watcher and the night stalker cipher syndicate eyes Swoba the raziel oracle curator!



Yeah you can leave now...`;

  const spacers={
    after_leave: 8,
    before_bye: 12,
    after_bye: 18,
    before_real_end: 8,
    after_real_end: 12,
    before_help: 8,
    after_help: 44,
    before_plastic: 8,
    after_plastic: 88,
    before_end_txt: 8,
    after_end_txt: 12,
    before_bronze: 8,
    after_bronze: 40,
    before_silver: 8,
    after_silver: 55,
    before_gold: 8,
    after_gold: 80,
    before_platinum: 8,
    after_platinum: 60,
    before_true: 8,
    after_true: 100,
    before_dots1: 12,
    after_dots1: 55,
    before_dots2: 8,
    after_dots2: 80,
  };

  function br(n){ return '\n'.repeat(n); }

  const full=document.createElement('div');
  full.className='end-text';
  // 10x bigger space after the "curator!" sign-off = roughly 80 newlines
  full.textContent=content+br(80)+'Bye'+br(18)+'This is the real end'+br(12)+'Go help other people if you have this much time to spare'+br(44);
  scroll.appendChild(full);

  function addTrophy(cls,text,extraBefore=8,extraAfter=88){
    const sp=document.createElement('div');
    sp.className='end-text'; sp.textContent=br(extraBefore);
    scroll.appendChild(sp);
    const t=document.createElement('div');
    t.className=`trophy ${cls}`; t.textContent=text;
    scroll.appendChild(t);
    const sp2=document.createElement('div');
    sp2.className='end-text'; sp2.textContent=br(extraAfter);
    scroll.appendChild(sp2);
  }

  // Plastic
  addTrophy('plastic','⬡ Plastic bobkanium unlocked',8,88);

  const endTxt=document.createElement('div');
  endTxt.className='end-text';
  endTxt.textContent='The end! Thanks for playing!'+br(8);
  scroll.appendChild(endTxt);

  // Bronze — 20x bigger space after = 800 newlines
  addTrophy('bronze','⬡ Bronze bobkanium unlocked!',8,800);

  const bronzeTxt=document.createElement('div');
  bronzeTxt.className='end-text';
  bronzeTxt.textContent='That was faster than i expected!'+br(8);
  scroll.appendChild(bronzeTxt);

  // Silver — 40x bigger space after = 1600 newlines
  addTrophy('silver','⬡ Silver bobkanium unlocked!',8,1600);

  // Gold — no text after, just massive gap before true = 100x = 4000 newlines
  addTrophy('gold','⬡ Gold bobkanium unlocked! Congrats, for this you go claim an achievement by typing "lonely soul"',8,4000);

  // Platinum (somewhere in the middle of gold→true gap handled by gold's after space)
  addTrophy('platinum','⬡ Platinum bobkanium unlocked!\n\nYeah ur not getting anything, BECAUSE UR NOT SUPPOSED TO BE HERE',8,2000);

  // True
  addTrophy('true','✦ True bobkanium unlocked!\n\nAs you can see its the true bobkanium so its the last one, and for that you can go claim an achievement by typing "True bobkanium" HMPH',8,200);

  // After true: dots every 2x the gold→true space (4000*2=8000 newlines between each dot group)
  // Add ~15 dot groups to make it feel endless
  const dotContainer=document.createElement('div');
  dotContainer.className='end-text';
  dotContainer.style.color='rgba(100,80,160,0.25)';
  let dotContent='';
  for(let i=0;i<15;i++){
    dotContent+=br(8000)+'...';
  }
  dotContent+=br(8000);
  dotContainer.textContent=dotContent;
  scroll.appendChild(dotContainer);
}

window.addEventListener('resize',()=>{
  sc.width=window.innerWidth; sc.height=window.innerHeight;
  gc.width=window.innerWidth; gc.height=window.innerHeight;
});

document.getElementById('conn-total').textContent=requiredConns.length;
</script>
